{{define "form/pptp"}}
<a-form
    :colon="false"
    :label-col="{ md: {span:8} }"
    :wrapper-col="{ md: {span:14} }"
>
    <a-form-item>
        <template slot="label">
            <a-tooltip>
                <template slot="title">
                    Leave empty to auto-assign; a new range is added automatically when a
                    range fills up.
                </template>
                IP Range
                <a-icon type="question-circle"></a-icon>
            </a-tooltip>
        </template>
        <a-button
            icon="plus"
            type="primary"
            size="small"
            @click="inbound.settings.ipRanges.push('')"
        ></a-button>
        <template v-for="(row, index) in inbound.settings.ipRanges">
            <a-input
                :style="{ marginTop: '8px' }"
                v-model.trim="inbound.settings.ipRanges[index]"
                placeholder="auto-assigned (e.g. 10.1.5.2-10.1.5.254)"
            >
                <a-button
                    icon="minus"
                    slot="addonAfter"
                    size="small"
                    @click="inbound.settings.ipRanges.splice(index, 1)"
                ></a-button>
            </a-input>
        </template>
    </a-form-item>
    <a-form-item label="DNS 1">
        <a-input
            v-model.trim="inbound.settings.dns1"
            placeholder="8.8.8.8"
        ></a-input>
    </a-form-item>
    <a-form-item label="DNS 2">
        <a-input
            v-model.trim="inbound.settings.dns2"
            placeholder="8.8.4.4"
        ></a-input>
    </a-form-item>
    <a-form-item label="MTU">
        <a-input-number
            v-model.number="inbound.settings.mtu"
            :min="1000"
            :max="1500"
        ></a-input-number>
    </a-form-item>
    <a-form-item>
        <template slot="label">
            <a-tooltip>
                <template slot="title">
                    Simultaneous devices per account (each device gets its own IP; 1 = single device, or an even number 2-64)
                </template>
                User Limit
                <a-icon type="question-circle"></a-icon>
            </a-tooltip>
        </template>
        <a-input-number
            :value="inbound.settings.userLimit"
            @change="inbound.settings.userLimit = ($event <= 1 ? 1 : Math.min(64, ($event % 2 ? $event - 1 : $event)))"
            :min="1" :max="64" :step="2" :precision="0" style="width: 90px"
        ></a-input-number>
    </a-form-item>
    <a-form-item>
        <template slot="label">
            <a-tooltip>
                <template slot="title">
                    When an account is already at its device limit and another
                    device connects: reject the new one, or accept it and
                    disconnect that account's oldest device.
                </template>
                User Limit Strategy
                <a-icon type="question-circle"></a-icon>
            </a-tooltip>
        </template>
        <a-radio-group v-model="inbound.settings.userLimitStrategy" button-style="solid">
            <a-radio-button value="accept">Accept</a-radio-button>
            <a-radio-button value="reject">Reject</a-radio-button>
        </a-radio-group>
    </a-form-item>
    <a-form-item>
        <template slot="label">
            <a-tooltip>
                <template slot="title">
                    Allow connected clients to reach each other
                </template>
                Client to Client
                <a-icon type="question-circle"></a-icon>
            </a-tooltip>
        </template>
        <a-switch
            v-model="inbound.settings.clientToClient"
            @change="val => { if (!val) inbound.settings.crossInbound = false }"
        ></a-switch>
    </a-form-item>
    <a-form-item>
        <template slot="label">
            <a-tooltip>
                <template slot="title">
                    Also reach clients of other inbounds (both inbounds must enable this)
                </template>
                Cross Inbound
                <a-icon type="question-circle"></a-icon>
            </a-tooltip>
        </template>
        <a-switch
            v-model="inbound.settings.crossInbound"
            :disabled="!inbound.settings.clientToClient"
        ></a-switch>
    </a-form-item>
</a-form>
{{end}}
