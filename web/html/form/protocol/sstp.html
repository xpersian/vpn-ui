{{define "form/sstp"}}
<a-form
    :colon="false"
    :label-col="{ md: {span:8} }"
    :wrapper-col="{ md: {span:14} }"
>
    <a-form-item>
        <template slot="label">
            <a-tooltip>
                <template slot="title">
                    Auto-managed contiguous block (10.5.x). Grows automatically as
                    clients are added.
                </template>
                IP Range
                <a-icon type="question-circle"></a-icon>
            </a-tooltip>
        </template>
        <template v-if="inbound.settings.ipRanges && inbound.settings.ipRanges.length">
            <a-input
                v-for="(r, i) in inbound.settings.ipRanges"
                :key="i"
                :value="r"
                read-only
                :style="{ marginBottom: '4px' }"
            ></a-input>
        </template>
        <span v-else :style="{ color: '#888' }">
            Assigned automatically on save
        </span>
    </a-form-item>
    <a-form-item label="DNS 1">
        <a-input v-model.trim="inbound.settings.dns1" placeholder="8.8.8.8"></a-input>
    </a-form-item>
    <a-form-item label="DNS 2">
        <a-input v-model.trim="inbound.settings.dns2" placeholder="8.8.4.4"></a-input>
    </a-form-item>
    <a-form-item label="MTU">
        <a-input-number
            v-model.number="inbound.settings.mtu"
            :min="1200"
            :max="1500"
        ></a-input-number>
    </a-form-item>
    <a-form-item>
        <template slot="label">
            <a-tooltip>
                <template slot="title">
                    Simultaneous devices per account (each device gets its own IP;
                    1 = single device, or 2-64)
                </template>
                User Limit
                <a-icon type="question-circle"></a-icon>
            </a-tooltip>
        </template>
        <a-input-number
            :value="inbound.settings.userLimit"
            @change="inbound.settings.userLimit = Math.max(1, Math.min(64, Math.floor($event || 1)))"
            :min="1" :max="64" :step="1" :precision="0" style="width: 90px"
        ></a-input-number>
    </a-form-item>
    <a-form-item>
        <template slot="label">
            <a-tooltip>
                <template slot="title">
                    When an account is already at its device limit and another
                    device connects: reject the new one, or accept it and
                    disconnect that account's oldest device.
                </template>
                User Limit Strategy
                <a-icon type="question-circle"></a-icon>
            </a-tooltip>
        </template>
        <a-radio-group v-model="inbound.settings.userLimitStrategy" button-style="solid">
            <a-radio-button value="accept">Accept</a-radio-button>
            <a-radio-button value="reject">Reject</a-radio-button>
        </a-radio-group>
    </a-form-item>
    <a-form-item>
        <template slot="label">
            <a-tooltip>
                <template slot="title">
                    Allow connected clients to reach each other
                </template>
                Client to Client
                <a-icon type="question-circle"></a-icon>
            </a-tooltip>
        </template>
        <a-switch
            v-model="inbound.settings.clientToClient"
            @change="val => { if (!val) inbound.settings.crossInbound = false }"
        ></a-switch>
    </a-form-item>
    <a-form-item>
        <template slot="label">
            <a-tooltip>
                <template slot="title">
                    Also reach clients of other inbounds (both inbounds must enable this)
                </template>
                Cross Inbound
                <a-icon type="question-circle"></a-icon>
            </a-tooltip>
        </template>
        <a-switch
            v-model="inbound.settings.crossInbound"
            :disabled="!inbound.settings.clientToClient"
        ></a-switch>
    </a-form-item>

    <a-divider>TLS Certificate</a-divider>
    <a-form-item label="Certificate Source">
        <a-radio-group v-model="inbound.settings.tlsUseFile" button-style="solid">
            <a-radio-button :value="true">Path</a-radio-button>
            <a-radio-button :value="false">Content</a-radio-button>
        </a-radio-group>
    </a-form-item>
    <template v-if="inbound.settings.tlsUseFile">
        <a-form-item label="Certificate Path">
            <a-input
                v-model.trim="inbound.settings.certificateFile"
                placeholder="/path/to/fullchain.pem"
            >
                <template slot="addonAfter">
                    <a-tooltip title="Use the panel's TLS certificate paths">
                        <a-icon type="import" @click="sstpSetDefaultCert"></a-icon>
                    </a-tooltip>
                </template>
            </a-input>
        </a-form-item>
        <a-form-item label="Key Path">
            <a-input
                v-model.trim="inbound.settings.keyFile"
                placeholder="/path/to/privkey.pem"
            ></a-input>
        </a-form-item>
    </template>
    <template v-else>
        <a-form-item label="Server Certificate">
            <a-textarea
                v-model="inbound.settings.certificate"
                :rows="3"
                placeholder="-----BEGIN CERTIFICATE-----"
            ></a-textarea>
        </a-form-item>
        <a-form-item label="Server Key">
            <a-textarea
                v-model="inbound.settings.key"
                :rows="3"
                placeholder="-----BEGIN EC PRIVATE KEY-----"
            ></a-textarea>
        </a-form-item>
        <a-form-item :wrapper-col="{ md: {offset:8, span:14} }">
            <a-button type="primary" @click="generateSstpCert">
                Generate Self-Signed Cert
            </a-button>
        </a-form-item>
    </template>
</a-form>
{{end}}
